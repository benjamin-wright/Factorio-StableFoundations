[mod-name]
StableFoundations=稳固地基

[mod-description]
StableFoundations=当建筑和结构建造在石砖或混凝土地砖上时，将获得更高的耐久度。此外，还支持对车辆、机器人与玩家进行完整的配置。

[mod-setting-description]
sf-building-bonus-toggle=修改大部分组装和生产类建筑的属性效果，使其能够获得地基加成，即使原本并非如此设计。[color=red]根据具体情况，此设置可能导致模组建筑工作异常。[/color]禁用此项将使用原版的加成属性设定。
sf-reinforce-popup-toggle=在建造于地基之上的结构上显示浮动文本提示。
sf-refined-reduction-percent=[font=default-bold]百分比[/font]：当建筑/单位位于三级地砖上时，减免的伤害百分比。\n设为 [color=yellow]0 无减免[/color]，[color=cyan]100 完全免疫[/color]。
sf-refined-reduction-flat=[font=default-bold]固定值[/font]：当建筑/单位位于三级地砖上时，忽略的伤害固定值。此减免在[font=default-bold]百分比减免之前[/font]应用。
sf-concrete-reduction-percent=[font=default-bold]百分比[/font]：当建筑/单位位于二级地砖上时，减免的伤害百分比。\n设为 [color=yellow]0 无减免[/color]，[color=cyan]100 完全免疫[/color]。
sf-concrete-reduction-flat=[font=default-bold]固定值[/font]：当建筑/单位位于二级地砖上时，忽略的伤害固定值。此减免在[font=default-bold]百分比减免之前[/font]应用。
sf-stone-reduction-percent=[font=default-bold]百分比[/font]：当建筑/单位位于一级地砖上时，减免的伤害百分比。\n设为 [color=yellow]0 无减免[/color]，[color=cyan]100 完全免疫[/color]。
sf-stone-reduction-flat=[font=default-bold]固定值[/font]：当建筑/单位位于一级地砖上时，忽略的伤害固定值。此减免在[font=default-bold]百分比减免之前[/font]应用。
sf-military-target-toggle=允许防御性建筑（如炮塔、火炮和雷达）获得加固效果。
sf-reinforce-wall-toggle=允许墙体与城门获得加固效果。
sf-reinforce-units-toggle=允许单位与车辆在地基上时获得加固效果。
sf-reinforce-players-toggle=允许玩家在地基上时获得加固效果。
sf-friendly-explosion-reduction=[font=default-bold]百分比[/font]：地基上的建筑/单位受到友军爆炸伤害时，造成的伤害比例。\n设为 [color=cyan]0 完全免疫[/color]，[color=yellow]100 为原版默认[/color]。
sf-friendly-impact-reduction=[font=default-bold]百分比[/font]：地基上的建筑/单位受到友军撞击伤害（如车辆）时，造成的伤害比例。\n设为 [color=cyan]0 完全免疫[/color]，[color=yellow]100 为原版默认[/color]。
sf-friendly-physical-reduction=[font=default-bold]百分比[/font]：地基上的建筑/单位受到友军物理伤害时，造成的伤害比例。\n设为 [color=cyan]0 完全免疫[/color]，[color=yellow]100 为原版默认[/color]。
sf-friendly-other-reduction=[font=default-bold]百分比[/font]：地基上的建筑/单位受到友军[font=default-bold]任何其他类型伤害[/font]（火焰、酸性、激光等）时，造成的伤害比例。\n设为 [color=cyan]0 完全免疫[/color]，[color=yellow]100 为原版默认[/color]。
sf-friendly-reduction-toggle=友军对地基上的建筑/单位造成伤害时，是否应用伤害减免。若启用，友方伤害效果将在[font=default-bold]伤害减免之前[/font]应用。
sf-quality-damage-reduction=[font=default-bold]百分比[/font]：根据建筑/单位的品质（太空时代）减免的伤害。\n[font=default-bold][color=cyan]品质等级[/color] × [color=cyan]n%[/color][/font] 伤害减免。[font=default-bold]设为 0 以禁用。[/font]
sf-max-reduction-percent=[font=default-bold]最大百分比[/font]：允许来自地砖 + 品质合并的伤害减免上限。同时限制显示的加固值与实际减伤效果。\n[color=yellow]友方伤害效果设置不受此上限影响。[/color]
sf-entity-refresh=记录地基上受损实体以应用正确伤害减免的刷新频率（单位：游戏刻）。较高的数值可能导致意外行为。\n[color=yellow]6 刻 ≈ 0.1 秒[/color]，[color=orange]60 刻 ≈ 1 秒[/color]。
sf-entity-tick-count=每次更新刷新时检查的实体数量。\n[color=red]较高的数值会降低游戏性能！[/color]
sf-invulnerable-poles-toggle=大型电线杆建造在地基上时免疫伤害。同时防止敌人攻击这些结构。\n[color=red]更新此设置将保留现有电线杆的免疫状态！[/color]
sf-invulnerable-rails-toggle=铁路与信号灯建造在地基上时免疫伤害。同时防止敌人攻击这些结构。\n[color=red]更新此设置将保留现有铁路与信号灯的免疫状态！[/color]
sf-invulnerable-lamps-toggle=灯具建造在地基上时免疫伤害。同时防止敌人攻击这些结构。\n[color=red]更新此设置将保留现有灯具的免疫状态！[/color]
sf-smoke-cleanup-toggle=限制加固结构上叠加的毒雾/烟雾云（带触发器的烟雾实体），以减少重叠触发器带来的卡顿。在 Rampant 等密集型模组中非常有用。
sf-particle-reduction-toggle=减少结构受击/摧毁动画中的粒子数量，以减轻过多粒子生成导致的卡顿。在 Rampant 等密集型模组中非常有用。
sf-production-bonus-toggle=部分建筑在地基上时，会根据地基等级获得生产力加成。
sf-efficiency-bonus-toggle=部分建筑在地基上时，会根据地基等级获得能耗效率加成。
sf-speed-bonus-toggle=部分建筑在地基上时，会根据地基等级获得速度加成。
sf-production-list=[font=default-bold]百分比[/font]：为组装类建筑添加的生产力加成。数值格式分别对应[color=#8eff9b]三级[/color]、[color=#8ac7ff]二级[/color]与[color=yellow]一级[/color]地基。\n范围：[0 - 200] 默认：[[color=#8eff9b]5[/color], [color=#8ac7ff]3[/color], [color=yellow]2[/color]] [font=default-bold]设为 0 以禁用。[/font]
sf-speed-list=[font=default-bold]百分比[/font]：为组装类建筑添加的速度加成。数值格式分别对应[color=#8eff9b]三级[/color]、[color=#8ac7ff]二级[/color]与[color=yellow]一级[/color]地基。\n范围：[0 - 200] 默认：[[color=#8eff9b]10[/color], [color=#8ac7ff]7[/color], [color=yellow]4[/color]] [font=default-bold]设为 0 以禁用。[/font]
sf-efficiency-list=[font=default-bold]百分比[/font]：为组装类建筑添加的能耗效率加成。数值格式分别对应[color=#8eff9b]三级[/color]、[color=#8ac7ff]二级[/color]与[color=yellow]一级[/color]地基。\n范围：[0 - 200] 默认：[[color=#8eff9b]15[/color], [color=#8ac7ff]10[/color], [color=yellow]5[/color]] [font=default-bold]设为 0 以禁用。[/font]
sf-list-tier3=为建筑/实体提供[font=default-bold]高等[/font]加成的地砖。建议使用内部名称，部分匹配可能导致意外结果。
sf-list-tier2=为建筑/实体提供[font=default-bold]中等[/font]加成的地砖。建议使用内部名称，部分匹配可能导致意外结果。
sf-list-tier1=为建筑/实体提供[font=default-bold]低等[/font]加成的地砖。建议使用内部名称，部分匹配可能导致意外结果。
sf-list-bonus=允许获得地基加成的建筑类型列表。此设置使用内部[font=default-bold]原型类型[/font]。查看维基获取更多信息。
sf-list-exclude=不获得地基加成的建筑类型列表。此设置使用内部[font=default-bold]原型类型[/font]。查看维基获取更多信息。

