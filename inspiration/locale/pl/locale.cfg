[mod-name]
StableFoundations=Stable Foundations

[mod-description]
StableFoundations=Budynki i konstrukcje mają teraz zwiększoną odporność na uszkodzenia, jeśli zostaną wzniesione na kafelkach z kamienia lub betonu. Funkcja jest w pełni konfigurowalna w odniesieniu do pojazdów, robotów i graczy.

[mod-setting-description]
sf-building-bonus-toggle=Zmienia efekty właściwości większości budynków typu montażowego i produkcyjnego, aby umożliwić bonusy fundamentowe, nawet jeśli pierwotnie nie były one przewidziane. [color=red]To ustawienie może spowodować, że zmodyfikowane budynki nie będą działać zgodnie z zamierzeniami![/color] Wyłączenie tej opcji spowoduje użycie domyślnych ustawień właściwości dla bonusów.
sf-reinforce-popup-toggle=Pokaż pływający wskaźnik tekstowy na konstrukcjach, gdy są one zbudowane na fundamencie.
sf-refined-reduction-percent=[font=default-bold]Procentowa wartość[/font] obrażeń zmniejszonych, gdy konstrukcja/jednostka na polu poziomu 3 zostanie uszkodzona.\nUstaw na [color=yellow]0, aby nie stosować redukcji[/color] oraz [color=cyan]100, aby uzyskać pełną odporność[/color].
sf-refined-reduction-flat=[font=default-bold] Stała wartość[/font] obrażeń ignorowanych, gdy budynek/jednostka na polu poziomu 3 zostanie uszkodzona. Jest to stosowane [font=default-bold]przed[/font] redukcją procentową.
sf-concrete-reduction-percent=[font=default-bold]Procentowa wartość[/font] obrażeń zmniejszonych, gdy budynek/jednostka na polu poziomu 2 zostanie uszkodzona.\nUstaw na [color=yellow]0, aby nie stosować redukcji[/color] oraz na [color=cyan]100, aby uzyskać pełną odporność[/color].
sf-concrete-reduction-flat=[font=default-bold]Stała wartość[/font] obrażeń ignorowanych, gdy budynek/jednostka na polu poziomu 2 zostanie uszkodzona. Jest ona stosowana [font=default-bold]przed[/font] procentową redukcją.
sf-stone-reduction-percent=[font=default-bold]Procentowa wartość[/font] obrażeń zmniejszonych, gdy budynek/jednostka na polu poziomu 1 zostaje uszkodzona.\nUstaw na [color=yellow]0, aby nie stosować redukcji[/color] oraz na [color=cyan]100, aby uzyskać pełną odporność[/color].
sf-stone-reduction-flat=[font=default-bold]Stała wartość[/font] obrażeń ignorowanych, gdy budynek/jednostka na polu poziomu 1 zostanie uszkodzona. Jest to stosowane [font=default-bold]przed[/font] redukcją procentową.
sf-military-target-toggle=Pozwala na wzmocnienie budynków wojskowych, takich jak wieżyczki, artyleria i radary.
sf-reinforce-wall-toggle=Pozwala na wzmocnienie murów i bram.
sf-reinforce-units-toggle=Pozwala na wzmocnienie jednostek i pojazdów, o ile znajdują się one na fundamencie.
sf-reinforce-players-toggle=Pozwala na wzmocnienie graczy, o ile znajdują się oni na fundamencie.
sf-friendly-explosion-reduction=[font=default-bold]Procentowa wartość[/font] obrażeń zadawanych, gdy budynek/jednostka na fundamencie zostaje uszkodzona przez wybuchy pochodzące od sojuszniczej jednostki.\nUstaw na [color=cyan]0 dla pełnej odporności[/color] i [color=yellow]100 dla domyślnej wartości z podstawowej wersji gry[/color].
sf-friendly-impact-reduction=[font=default-bold]Procentowa wartość[/font] obrażeń zadawanych, gdy budynek/jednostka na fundamencie zostanie uszkodzona w wyniku uderzenia (pojazdy) przez sojuszniczą jednostkę.\nUstaw na [color=cyan]0, aby uzyskać pełną odporność[/color], oraz na [color=yellow]100, aby przywrócić domyślne ustawienie[/color].
sf-friendly-physical-reduction=[font=default-bold]Procentowa wartość[/font] obrażeń zadawanych, gdy budynek/jednostka na fundamencie zostanie trafiona obrażeniami fizycznymi od sojuszniczej jednostki.\nUstaw na [color=cyan]0 dla pełnej odporności[/color] i [color=yellow]100 dla domyślnej wartości z podstawowej wersji gry[/color].
sf-friendly-other-reduction=[font=default-bold]Procentowa wartość[/font] zadawanych obrażeń, gdy budynek/jednostka na fundamencie zostanie trafiona [font=default-bold]dowolnym innym typem obrażeń[/font] (ogień, kwas, laser itp.) od sojuszniczej jednostki.\nUstaw na [color=cyan]0 dla pełnej odporności[/color] i [color=yellow]100 dla domyślnej wartości z podstawowej wersji gry[/color].
sf-friendly-reduction-toggle=Redukcja obrażeń jest stosowana do ostrzału własnego budynku/jednostki na fundamencie. Jeśli opcja jest włączona, skuteczność obrażeń własnych jest stosowana [font=default-bold]przed[/font] redukcją obrażeń.
sf-quality-damage-reduction=[font=default-bold]Procentowa wartość[/font] zmniejszonych obrażeń w oparciu o jakość budynku/jednostki (Space Age).\n[font=default-bold][color=cyan]Poziom jakości[/color] × [color=cyan]n%[/color][/font] redukcji obrażeń. [font=default-bold]Ustaw na 0, aby wyłączyć.[/font]
sf-max-reduction-percent=[font=default-bold]Maksymalny procent[/font] redukcji obrażeń dozwolony łącznie z kafelka i jakości. Ogranicza zarówno wyświetlaną wartość wzmocnienia, jak i faktycznie stosowaną redukcję.\n[color=yellow]Ustawienia skuteczności obrażeń sojuszniczych nie są objęte tym limitem.[/color]
sf-entity-refresh=Jak często w taktach rejestrować uszkodzone obiekty na fundamentach, aby zastosować prawidłową redukcję obrażeń. Wyższe wartości mogą skutkować niepożądanym zachowaniem.\n[color=yellow]6 taktów ≈ 0,1 sekundy[/color], [color=orange]60 taktów ≈ 1 sekunda[/color].
sf-entity-tick-count=Ile obiektów sprawdzać przy każdym odświeżeniu aktualizacji.\n[color=red]Wyższe wartości spowodują spowolnienie działania gry![/color]
sf-invulnerable-poles-toggle=Duże słupy elektryczne są odporne na uszkodzenia, gdy zostaną postawione na fundamencie. Uniemożliwia to również wrogom atakowanie tych konstrukcji.\n[color=red]Zmiana tego ustawienia zachowa aktualny status odporności istniejących słupów![/color]
sf-invulnerable-rails-toggle=Tory kolejowe i sygnalizacja są odporne na uszkodzenia, gdy są zbudowane na fundamencie. Uniemożliwia to również wrogom atakowanie tych konstrukcji.\n[color=red]Zmiana tego ustawienia zachowa aktualny status odporności istniejących torów kolejowych i sygnalizacji![/color]
sf-invulnerable-lamps-toggle=Lampy są odporne na uszkodzenia, gdy są zbudowane na fundamencie. Uniemożliwia to również wrogom atakowanie tych konstrukcji.\n[color=red]Zmiana tego ustawienia zachowa aktualny status odporności istniejących lamp![/color]
sf-smoke-cleanup-toggle=Ogranicza nakładające się chmury trucizny/dymu (obiekty smoke-with-trigger) na wzmocnionych konstrukcjach, aby zmniejszyć opóźnienia powodowane przez zachodzące na siebie wyzwalacze. Przydatne w intensywnych modach, takich jak Rampant.
sf-particle-reduction-toggle=Zmniejsza liczbę cząstek w animacjach uszkodzenia/zniszczenia konstrukcji, aby ograniczyć opóźnienia powodowane przez nadmierne generowanie cząstek. Przydatne w intensywnych modach, takich jak Rampant.
sf-production-bonus-toggle=Niektóre budynki zyskują wzrost produkcyjności, gdy są zbudowane na fundamencie, w zależności od jego skuteczności.
sf-efficiency-bonus-toggle=Niektóre budynki zyskują wzrost wydajności, gdy są zbudowane na fundamencie, w zależności od jego skuteczności.
sf-speed-bonus-toggle=Niektóre budynki zyskują wzrost prędkości, gdy są zbudowane na fundamencie, w zależności od jego skuteczności.
sf-production-list=[font=default-bold]Procentowa wartość[/font] premii do produkcyjności dodawanej do budynku typu montażowego. Wartości liczbowe są sformatowane odpowiednio jako [color=#8eff9b]Poziom 3[/color], [color=#8ac7ff]Poziom 2[/color] oraz [color=yellow]Poziom 1[/color].\nWartości: [0 - 200] Domyślnie: [[color=#8eff9b]5[/color], [color=#8ac7ff]3[/color], [color=yellow]2[/color]] [font=default-bold]Ustaw na 0, aby wyłączyć.[/font]
sf-speed-list=[font=default-bold]Procentowa wartość[/font] premii do prędkości dodawanej do budynku typu montażowego. Wartości liczbowe są sformatowane odpowiednio jako [color=#8eff9b]Poziom 3[/color], [color=#8ac7ff]Poziom 2[/color] i [color=yellow]Poziom 1[/color].\nWartości: [0 - 200] Domyślnie: [[color=#8eff9b]10[/color], [color=#8ac7ff]7[/color], [color=yellow]4[/color]] [font=default-bold]Ustaw na 0, aby wyłączyć.[/font]
sf-efficiency-list=[font=default-bold]Procentowa wartość[/font] premii do wydajności dodawanej do budynku typu montażowego. Wartości liczbowe są sformatowane odpowiednio do [color=#8eff9b]Poziomu 3[/color], [color=#8ac7ff]Poziomu 2[/color] i [color=yellow]Poziom 1[/color].\nWartości: [0 - 200] Domyślnie: [[color=#8eff9b]15[/color], [color=#8ac7ff]10[/color], [color=yellow]5[/color]] [font=default-bold]Ustaw na 0, aby wyłączyć.[/font]
sf-list-tier3=Kafelki zapewniające [font=default-bold]wysoki poziom[/font] premii dla budynków/obiektów. Zalecane jest stosowanie nazw wewnętrznych, dopasowanie częściowe może spowodować niepożądane zachowanie.
sf-list-tier2=Kafelki zapewniające [font=default-bold]średni poziom[/font] premii dla budynków/obiektów. Zalecane jest stosowanie nazw wewnętrznych, dopasowanie częściowe może spowodować niepożądane zachowanie.
sf-list-tier1=Kafelki zapewniające [font=default-bold]niski poziom[/font] premii dla budynków/obiektów. Zalecane jest stosowanie nazw wewnętrznych, dopasowanie częściowe może spowodować niepożądane zachowanie.
sf-list-bonus=Lista typów budynków, których właściwości zostały dostosowane, aby umożliwić uzyskanie premii z fundamentów. To ustawienie wykorzystuje wewnętrzny [font=default-bold]typ Prototypów[/font]. Więcej informacji znajdziesz na wiki.
sf-list-exclude=Lista typów budynków, które są wykluczone z otrzymywania premii z fundamentów. To ustawienie wykorzystuje wewnętrzny [font=default-bold]typ Prototypów[/font]. Więcej informacji znajdziesz na wiki.

