[mod-name]
StableFoundations=Stabile Fundamente

[mod-description]
StableFoundations=Gebäude und Strukturen haben jetzt eine verbesserte Schadensresistenz, wenn sie auf Stein- und Betonkacheln gebaut werden. Auch vollständig konfigurierbar mit Fahrzeugen, Robotern und Spielern.

[mod-setting-description]
sf-building-bonus-toggle=Ändert die Eigenschaften der meisten Montage- und Produktionsgebäude, sodass Fundamentboni angewendet werden können, selbst wenn dies ursprünglich nicht vorgesehen war. [color=red]Diese Einstellung kann dazu führen, dass modifizierte Gebäude je nach Umständen fehlerhaft funktionieren.[/color] Das Deaktivieren verwendet die Standard-Eigenschaftseinstellungen für Boni.
sf-reinforce-popup-toggle=Zeigt einen schwebenden Textindikator auf Strukturen an, wenn sie auf ein Fundament gebaut werden.
sf-refined-reduction-percent=[font=default-bold]Prozentualer Wert[/font] des Schadens, der ignoriert wird, wenn eine Struktur/Einheit auf einem Stufe-3-Feld beschädigt wird.\nSetze auf [color=yellow]0 für keine Reduktion[/color] und [color=cyan]100 für vollständige Immunität[/color].
sf-refined-reduction-flat=[font=default-bold]Pauschalwert[/font] des Schadens, der ignoriert wird, wenn eine Struktur/Einheit auf einem Stufe-3-Feld beschädigt wird. Dies wird [font=default-bold]vor[/font] der prozentualen Reduktion angewendet.
sf-concrete-reduction-percent=[font=default-bold]Prozentualer Wert[/font] des Schadens, der ignoriert wird, wenn eine Struktur/Einheit auf einem Stufe-2-Feld beschädigt wird.\nSetze auf [color=yellow]0 für keine Reduktion[/color] und [color=cyan]100 für vollständige Immunität[/color].
sf-concrete-reduction-flat=[font=default-bold]Pauschalwert[/font] des Schadens, der ignoriert wird, wenn eine Struktur/Einheit auf einem Stufe-2-Feld beschädigt wird. Dies wird [font=default-bold]vor[/font] der prozentualen Reduktion angewendet.
sf-stone-reduction-percent=[font=default-bold]Prozentualer Wert[/font] des Schadens, der ignoriert wird, wenn eine Struktur/Einheit auf einem Stufe-1-Feld beschädigt wird.\nSetze auf [color=yellow]0 für keine Reduktion[/color] und [color=cyan]100 für vollständige Immunität[/color].
sf-stone-reduction-flat=[font=default-bold]Pauschalwert[/font] des Schadens, der ignoriert wird, wenn eine Struktur/Einheit auf einem Stufe-1-Feld beschädigt wird. Dies wird [font=default-bold]vor[/font] der prozentualen Reduktion angewendet.
sf-military-target-toggle=Erlaubt es militärischen Gebäuden wie Türmen, Artillerie und Radaren, verstärkt zu werden.
sf-reinforce-wall-toggle=Erlaubt es, Mauern und Tore zu verstärken.
sf-reinforce-units-toggle=Erlaubt es Einheiten und Fahrzeugen, verstärkt zu werden, solange sie auf einem Fundament stehen.
sf-reinforce-players-toggle=Erlaubt es Spielern, verstärkt zu werden, solange sie auf einem Fundament stehen.
sf-friendly-explosion-reduction=[font=default-bold]Prozentualer Wert[/font] des Schadens, der von explosiven Angriffen befreundeter Einheiten ignoriert wird, wenn eine Struktur/Einheit auf einem Fundament beschädigt wird.\nSetze auf [color=cyan]0 für vollständige Immunität[/color] und [color=yellow]100 für die Standard-Einstellung[/color].
sf-friendly-impact-reduction=[font=default-bold]Prozentualer Wert[/font] des Schadens, der durch Aufprall (Fahrzeuge) von befreundeten Einheiten ignoriert wird, wenn eine Struktur/Einheit auf einem Fundament beschädigt wird.\nSetze auf [color=cyan]0 für vollständige Immunität[/color] und [color=yellow]100 für die Standard-Einstellung[/color].
sf-friendly-physical-reduction=[font=default-bold]Prozentualer Wert[/font] des Schadens, der durch physischen Schaden befreundeter Einheiten ignoriert wird, wenn eine Struktur/Einheit auf einem Fundament getroffen wird.\nSetze auf [color=cyan]0 für vollständige Immunität[/color] und [color=yellow]100 für die Standard-Einstellung[/color].
sf-friendly-other-reduction=[font=default-bold]Prozentualer Wert[/font] des Schadens, der verursacht wird, wenn eine Struktur/Einheit auf einem Fundament durch [font=default-bold]einen anderen Schadenstyp[/font] (Feuer, Säure, Laser usw.) von einer befreundeten Einheit getroffen wird.\nSetze auf [color=cyan]0 für vollständige Immunität[/color] und [color=yellow]100 für die Standard-Einstellung[/color].
sf-friendly-reduction-toggle=Schadensreduktion wird auf Friendly-Fire-Schaden auf Strukturen/Einheiten auf einem Fundament angewendet. Wenn aktiviert, wird die Effektivität des Friendly-Fire-Schadens [font=default-bold]vor[/font] der Schadensreduktion angewendet.
sf-quality-damage-reduction=[font=default-bold]Prozentualer Anteil[/font] des Schadens, der basierend auf der Qualität einer Struktur/Einheit reduziert wird (Space Age).\n[font=default-bold][color=cyan]Qualitätsstufe[/color] × [color=cyan]n%[/color][/font] Schadensreduktion. [font=default-bold]Auf 0 setzen, um zu deaktivieren.[/font]
sf-max-reduction-percent=[font=default-bold]Maximaler Prozentsatz[/font] der Schadensreduktion, die durch Kachel + Qualität zusammen erlaubt ist. Begrenzt sowohl den angezeigten Verstärkungswert als auch die tatsächlich angewendete Reduktion.\n[color=yellow]Einstellungen zur Effektivität von Friendly-Fire-Schaden sind von dieser Begrenzung nicht betroffen.[/color]
sf-entity-refresh=Wie oft in Ticks beschädigte Einheiten auf Fundamenten protokolliert werden, um die korrekte Schadensreduktion anzuwenden. Höhere Werte können zu unerwünschtem Verhalten führen.\n[color=yellow]6 Ticks ≈ 0,1 Sekunden[/color], [color=orange]60 Ticks ≈ 1 Sekunde[/color].
sf-entity-tick-count=Wieviele Einheiten bei jedem Aktualisierungsintervall überprüft werden.\n[color=red]Höhere Werte führen zu geringerer Spielleistung![/color]
sf-invulnerable-poles-toggle=Große Strommasten sind immun gegen Schaden, wenn sie auf einem Fundament gebaut werden. Außerdem werden diese Strukturen nicht von Feinden angegriffen.\n[color=red]Das Aktualisieren dieser Einstellung bewahrt den aktuellen Immunitätsstatus bestehender Masten![/color]
sf-invulnerable-rails-toggle=Schienen und Signale sind immun gegen Schaden, wenn sie auf einem Fundament gebaut werden. Außerdem werden diese Strukturen nicht von Feinden angegriffen.\n[color=red]Das Aktualisieren dieser Einstellung bewahrt den aktuellen Immunitätsstatus bestehender Schienen und Signale![/color]
sf-invulnerable-lamps-toggle=Lampen sind immun gegen Schaden, wenn sie auf einem Fundament gebaut werden. Außerdem werden diese Strukturen nicht von Feinden angegriffen.\n[color=red]Das Aktualisieren dieser Einstellung bewahrt den aktuellen Immunitätsstatus bestehender Lampen![/color]
sf-smoke-cleanup-toggle=Begrenzt gestapelte Gift-/Rauchwolken (smoke-with-trigger-Entitäten) auf verstärkten Strukturen, um Verzögerungen durch überlappende Auslöser zu reduzieren. Nützlich in intensiven Mods wie Rampant.
sf-particle-reduction-toggle=Reduziert die Partikelanzahl in Schadens-/Zerstörungsanimationen von Strukturen, um Verzögerungen durch übermäßige Partikelerzeugung zu verringern. Nützlich in intensiven Mods wie Rampant.
sf-production-bonus-toggle=Einige Gebäude erhalten eine Produktivitätssteigerung, wenn sie auf einem Fundament gebaut werden, basierend auf dessen Effektivität.
sf-efficiency-bonus-toggle=Einige Gebäude erhalten eine Effizienzsteigerung, wenn sie auf einem Fundament gebaut werden, basierend auf dessen Effektivität.
sf-speed-bonus-toggle=Einige Gebäude erhalten eine Geschwindigkeitssteigerung, wenn sie auf einem Fundament gebaut werden, basierend auf dessen Effektivität.
sf-production-list=[font=default-bold]Prozentualer Wert[/font] des Produktivitätsbonus, der einem Montagetyp-Gebäude hinzugefügt wird. Zahlenwerte sind formatiert nach [color=#8eff9b]Stufe 3[/color], [color=#8ac7ff]Stufe 2[/color] und [color=yellow]Stufe 1[/color].\nWerte: [0 - 200] Standard: [[color=#8eff9b]5[/color], [color=#8ac7ff]3[/color], [color=yellow]2[/color]] [font=default-bold]Auf 0 setzen, um zu deaktivieren.[/font]
sf-speed-list=[font=default-bold]Prozentualer Wert[/font] des Geschwindigkeitsbonus, der einem Montagetyp-Gebäude hinzugefügt wird. Zahlenwerte sind formatiert nach [color=#8eff9b]Stufe 3[/color], [color=#8ac7ff]Stufe 2[/color] und [color=yellow]Stufe 1[/color].\nWerte: [0 - 200] Standard: [[color=#8eff9b]10[/color], [color=#8ac7ff]7[/color], [color=yellow]4[/color]] [font=default-bold]Auf 0 setzen, um zu deaktivieren.[/font]
sf-efficiency-list=[font=default-bold]Prozentualer Wert[/font] des Effizienzbonus, der einem Montagetyp-Gebäude hinzugefügt wird. Zahlenwerte sind formatiert nach [color=#8eff9b]Stufe 3[/color], [color=#8ac7ff]Stufe 2[/color] und [color=yellow]Stufe 1[/color].\nWerte: [0 - 200] Standard: [[color=#8eff9b]15[/color], [color=#8ac7ff]10[/color], [color=yellow]5[/color]] [font=default-bold]Auf 0 setzen, um zu deaktivieren.[/font]
sf-list-tier3=Kacheln, die [font=default-bold]hohe Boni[/font] für Strukturen/Einheiten bieten. Interne Namen werden empfohlen, teilweise Wortübereinstimmungen können zu unerwünschtem Verhalten führen.
sf-list-tier2=Kacheln, die [font=default-bold]mittlere Boni[/font] für Strukturen/Einheiten bieten. Interne Namen werden empfohlen, teilweise Wortübereinstimmungen können zu unerwünschtem Verhalten führen.
sf-list-tier1=Kacheln, die [font=default-bold]geringe Boni[/font] für Strukturen/Einheiten bieten. Interne Namen werden empfohlen, teilweise Wortübereinstimmungen können zu unerwünschtem Verhalten führen.
sf-list-bonus=Liste von Gebäudetypen, deren Eigenschaften angepasst werden, um Boni von Fundamenten zu erhalten. Diese Einstellung verwendet den internen [font=default-bold]Prototype type[/font]. Weitere Informationen findest du im Wiki.
sf-list-exclude=Liste von Gebäudetypen, die von der Erhaltung von Fundamentboni ausgeschlossen sind. Diese Einstellung verwendet den internen [font=default-bold]Prototype type[/font]. Weitere Informationen findest du im Wiki.

