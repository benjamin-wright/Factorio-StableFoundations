[mod-name]
SolidStructures=Solid Structures

[mod-description]
SolidStructures=Walls, gates, railways, signals, and power poles are permanently invulnerable. Buildings placed on foundation tiles receive 100% damage immunity and a productivity bonus scaling with the foundation quality.

[mod-setting-name]
ss-tier1-tiles=[img=tile/stone-path] Tier 1 foundation tiles:
ss-tier2-tiles=[img=tile/concrete] Tier 2 foundation tiles:
ss-tier3-tiles=[img=tile/refined-concrete] Tier 3 foundation tiles:
ss-tier1-productivity=[img=tile/stone-path] Tier 1 productivity bonus (%):
ss-tier2-productivity=[img=tile/concrete] Tier 2 productivity bonus (%):
ss-tier3-productivity=[img=tile/refined-concrete] Tier 3 productivity bonus (%):

[mod-setting-description]
ss-tier1-tiles=Comma-separated list of tile name substrings that count as Tier 1 (basic) foundations. Substring matching is used.
ss-tier2-tiles=Comma-separated list of tile name substrings that count as Tier 2 (medium) foundations. Substring matching is used.
ss-tier3-tiles=Comma-separated list of tile name substrings that count as Tier 3 (high) foundations. Substring matching is used.
ss-tier1-productivity=Productivity bonus (in percent) granted to productive buildings placed on Tier 1 foundation tiles.
ss-tier2-productivity=Productivity bonus (in percent) granted to productive buildings placed on Tier 2 foundation tiles.
ss-tier3-productivity=Productivity bonus (in percent) granted to productive buildings placed on Tier 3 foundation tiles.

[ss-mod]
ss-module-beacon-only=This module can only be used inside the Solid Structures hidden beacon.
